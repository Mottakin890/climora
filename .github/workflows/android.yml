name: Android Build & Release
on:
  push:
    branches:
      - develop
      - staging
      - production
      - main
      - master

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: '3.41.6'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Determine environment
        id: env
        run: |
          BRANCH=$(echo ${GITHUB_REF#refs/heads/})
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$BRANCH" = "develop" ]; then
            echo "ENV=dev" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENV=staging" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "production" || "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
          fi

      # Dev uses hardcoded values no secrets needed
      - name: Generate config (dev)
        if: steps.env.outputs.ENV == 'dev'
        run: ./scripts/generate_config.sh dev "https://dev.api.example.com" "dev_api_key" "dev_dummy_key"

      # Generate .env file for the app's runtime config loading
      - name: Generate .env file
        run: |
          if [ "${{ steps.env.outputs.ENV }}" = "staging" ]; then
            echo "STAGING_BASE_URL=${{ secrets.STAGING_BASE_URL || 'https://staging.api.example.com' }}" >> .env
            echo "STAGING_API_KEY=${{ secrets.STAGING_API_KEY || 'staging_dummy_key' }}" >> .env
          else
            echo "PRODUCTION_BASE_URL=${{ secrets.PROD_BASE_URL || 'https://api.example.com' }}" >> .env
            echo "PRODUCTION_API_KEY=${{ secrets.PROD_API_KEY || 'production_dummy_api_key' }}" >> .env
          fi

      # Staging and production inject real secrets
      - name: Generate config (staging/production)
        if: steps.env.outputs.ENV != 'dev'
        run: |
          if [ "${{ steps.env.outputs.ENV }}" = "staging" ]; then
            ./scripts/generate_config.sh staging \
              "${{ secrets.STAGING_BASE_URL }}" \
              "${{ secrets.STAGING_API_KEY }}" \
              "UNSET_ENCRYPTION_KEY"
          else
            ./scripts/generate_config.sh production \
              "${{ secrets.PROD_BASE_URL }}" \
              "${{ secrets.PROD_API_KEY }}" \
              "UNSET_ENCRYPTION_KEY"
          fi

      # Keystore is only needed for signed builds (staging & production)
      - name: Restore Keystore
        if: steps.env.outputs.ENV != 'dev'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # We build APKs for all environments since we're not publishing to the Play Store
      - name: Build artifact
        run: |
          if [ "${{ steps.env.outputs.ENV }}" = "production" ]; then
            flutter build apk --release \
              --obfuscate \
              --split-debug-info=build/symbols
          else
            flutter build apk --release
          fi

      # All builds go to GitHub Artifacts for manual installation/distribution
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: climora-${{ steps.env.outputs.ENV }}-build
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Notify Team (Success)
        if: success()
        run: |
          echo "Android Build & Release PASSED"
          echo "Environment: ${{ steps.env.outputs.ENV }}"
          echo "Branch: ${{ steps.env.outputs.branch }}"
          echo "By: @${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"

      - name: Notify Team (Failure)
        if: failure()
        run: |
          echo "Android Build & Release FAILED"
          echo "Environment: ${{ steps.env.outputs.ENV }}"
          echo "Branch: ${{ steps.env.outputs.branch }}"
          echo "By: @${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Check the logs and fix the issue before retrying"
